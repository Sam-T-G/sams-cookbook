# recipes.yaml — the machine-readable manifest of every recipe.
#
# The manifest-check CI gate asserts this file and the recipes/ tree agree exactly: every recipe
# directory has one entry here, and every entry points at a real directory. The /new-recipe skill
# writes both sides. Author is inline (no separate authors registry to drift).
#
# tier: logic-runnable | simulator-required | device-required
# tags (multi): Concurrency, Observation, Sensors, Networking, Persistence, Accessibility, Testing,
#               Claude-Native-Build, AI-OnDevice, AI-Cloud, Migration, Tooling

recipes:
  - title: "The concurrency posture"
    path: "recipes/02-language-concurrency/concurrency-posture"
    part: "02-language-concurrency"
    tier: "logic-runnable"
    tags: [Concurrency, Claude-Native-Build, Testing]
    author: "Samuel Gerungan"
    built_against: "Swift 6.3 / Xcode 26.5 / iOS 26 / claude-opus-4-8"
    date: "2026-06-21"
    description: >
      Sets the project-wide concurrency baseline: MainActor default isolation, strict concurrency
      complete, warnings as errors. A pure-logic example with golden-vector tests that proves the
      whole pipeline (template, /new-recipe, verify loop, CI) before any device-required recipe.

  - title: "Migrating from Combine and ObservableObject"
    path: "recipes/02-language-concurrency/migration-from-combine"
    part: "02-language-concurrency"
    tier: "logic-runnable"
    tags: [Concurrency, Observation, Migration, Claude-Native-Build, Testing]
    author: "Samuel Gerungan"
    built_against: "Swift 6.3 / Xcode 26.5 / iOS 26 / claude-opus-4-8"
    date: "2026-06-21"
    description: >
      Walks a real ObservableObject + Combine view model to @Observable plus an actor, with a parity test
      that proves the rewrite preserves behavior step for step. The migration on-ramp from the shape most
      existing iOS code actually starts at.

  - title: "Cloud Claude from Swift"
    path: "recipes/06-ai-features/cloud-claude-chat"
    part: "06-ai-features"
    tier: "logic-runnable"
    tags: [AI-Cloud, Networking, Claude-Native-Build, Testing]
    author: "Samuel Gerungan"
    built_against: "Swift 6.3 / Xcode 26.5 / iOS 26 / claude-opus-4-8"
    date: "2026-06-21"
    description: >
      A typed URLSession client for the Claude Messages API that holds no API key (the backend relay does).
      Encodes claude-opus-4-8 with adaptive thinking, the effort control, and structured outputs; golden
      vectors assert the request shape and the response decoding. The live call is device-verified.

  - title: "The hybrid on-device + Claude assistant"
    path: "recipes/06-ai-features/hybrid-assistant"
    part: "06-ai-features"
    tier: "logic-runnable"
    tags: [AI-OnDevice, AI-Cloud, Claude-Native-Build, Testing]
    author: "Samuel Gerungan"
    built_against: "Swift 6.3 / Xcode 26.5 / iOS 26 / claude-opus-4-8"
    date: "2026-06-21"
    description: >
      The flagship. Routes between an on-device Foundation Models backend and cloud Claude behind a shared
      LanguageBackend protocol, with a pure EscalationPolicy and golden vectors over the routing and
      escalation (fake backends, no device). The real on-device backend compiles behind canImport and is
      device-verified.
